syntax = "proto3";

package auth;

option go_package = "github.com/autovideo/auth-service/proto;authpb";

service AuthService {
  // 验证 access token，供其他微服务调用
  rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse);
  // 获取用户信息
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

message VerifyTokenRequest {
  string token = 1;
}

message VerifyTokenResponse {
  bool   valid   = 1;
  string user_id = 2;
  string role    = 3;
  string message = 4;
}

message GetUserRequest {
  uint64 user_id = 1;
}

message GetUserResponse {
  uint64 id         = 1;
  string username   = 2;
  string email      = 3;
  string phone      = 4;
  string avatar_url = 5;
  string role       = 6;
  string status     = 7;
}
