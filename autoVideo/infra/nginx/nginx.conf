# ============================================================
# AutoVideo API Gateway — Nginx 配置
# 监听 8000 端口，统一代理所有微服务
# ============================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 日志格式 ──────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time us="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 100m;   # 支持上传大文件（剧本/音频）

    # ── 限流区（防止 LLM/图像接口被刷）──────────────────
    # 每 IP 全局 30 req/s
    limit_req_zone  $binary_remote_addr  zone=global:10m  rate=30r/s;
    # LLM / 图像生成专用：每 IP 2 req/s
    limit_req_zone  $binary_remote_addr  zone=ai_api:10m  rate=2r/s;
    # 人工触发的工作流操作单独限流，避免和页面轮询抢同一个突发桶
    limit_req_zone  $binary_remote_addr  zone=workflow_ops:10m  rate=5r/s;

    # ── 上游服务池 ────────────────────────────────────────
    upstream auth_service {
        server host.docker.internal:8001;
        keepalive 16;
    }
    upstream project_service {
        server host.docker.internal:8002;
        keepalive 16;
    }
    upstream script_service {
        server host.docker.internal:8003;
        keepalive 16;
    }
    upstream character_service {
        server host.docker.internal:8004;
        keepalive 16;
    }
    upstream image_service {
        server host.docker.internal:8005;
        keepalive 16;
    }
    upstream video_service {
        server host.docker.internal:8006;
        keepalive 16;
    }
    upstream task_service {
        server host.docker.internal:8007;
        keepalive 16;
    }
    upstream model_service {
        server host.docker.internal:8008;
        keepalive 16;
    }
    upstream storage_service {
        server host.docker.internal:8009;
        keepalive 16;
    }
    upstream minio {
        server host.docker.internal:9000;
        keepalive 16;
    }

    # ── CORS 通用宏 ───────────────────────────────────────
    map $http_origin $cors_origin {
        default "";
        "~^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$" $http_origin;
        "~^https://autovideo\.example\.com$"              $http_origin;
    }

    # ── 主服务器 ──────────────────────────────────────────
    server {
        listen 8000;
        server_name _;
        proxy_read_timeout 60s;

        # 健康检查（不记日志）
        location = /healthz {
            access_log off;
            return 200 '{"status":"ok","gateway":"nginx"}';
            add_header Content-Type application/json;
        }

        # ── CORS 预检 ──────────────────────────────────
        location / {
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin  $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-User-ID" always;
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                return 204;
            }
            return 404 '{"code":404,"message":"not found"}';
            add_header Content-Type application/json;
        }

        # ──────────────────────────────────────────────────
        # /api/v1/auth/*  →  auth-service:8001
        # ──────────────────────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=global burst=20 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://auth_service;   # 原样转发完整路径
        }

        # ──────────────────────────────────────────────────
        # /api/v1/projects/*  →  project-service:8002
        # 含 episodes 子路由
        # ──────────────────────────────────────────────────

        # /api/v1/projects/{id}/assets/extract  →  character-service:8004 (long timeout for LLM)
        location ~ ^/api/v1/projects/[^/]+/assets/extract$ {
            limit_req zone=workflow_ops burst=20;
            limit_req_status 429;

            # CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin  $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-User-ID" always;
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                return 204;
            }

            # CORS response headers
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-User-ID" always;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            proxy_pass http://character_service;
        }

        # /api/v1/projects/{id}/assets*  →  character-service:8004
        location ~ ^/api/v1/projects/[^/]+/assets {
            limit_req zone=global burst=20 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://character_service;
        }

        # /api/v1/projects/{id}/consistency-config  →  character-service:8004
        location ~ ^/api/v1/projects/[^/]+/consistency-config {
            limit_req zone=global burst=20 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://character_service;
        }

        # /api/v1/projects/{id}/production-skills*  →  character-service:8004
        location ~ ^/api/v1/projects/[^/]+/production-skills {
            limit_req zone=global burst=20 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://character_service;
        }

        # /api/v1/projects/{id}/videos*  →  video-service:8006
        # /api/v1/projects/{id}/dubbing* →  video-service:8006
        # /api/v1/projects/{id}/subtitle* → video-service:8006
        location ~ ^/api/v1/projects/[^/]+/(videos|dubbing|subtitle) {
            limit_req zone=global burst=200 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_read_timeout 600s;
            proxy_pass http://video_service;
        }

        # /api/v1/projects/{id}/storage*  →  storage-service:8009
        location ~ ^/api/v1/projects/[^/]+/storage {
            limit_req zone=global burst=10 nodelay;
            client_max_body_size 500m;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_request_buffering off;
            proxy_pass http://storage_service;
        }

        # LLM 密集型 episode 操作 — 需更长超时（optimize/review/repair 链耗时 60-180s）
        # 必须在通用 /api/v1/projects 之前匹配（nginx 正则 > 前缀）
        location ~ ^/api/v1/projects/[^/]+/episodes/[^/]+/(auto-optimize-review|optimize|review|repair|apply-optimized|storyboards/extract)$ {
            limit_req zone=workflow_ops burst=5;

            # CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin  $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-User-ID, X-Autovideo-Skip-Asset-Refresh" always;
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                return 204;
            }

            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-User-ID, X-Autovideo-Skip-Asset-Refresh" always;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_pass http://project_service;
        }

        # All other /api/v1/projects/* → project-service:8002
        location /api/v1/projects {
            limit_req zone=global burst=20 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://project_service;
        }

        # ──────────────────────────────────────────────────
        # /api/v1/scripts/*  →  script-service:8003
        # 含 scenes 子路由；LLM 分析接口单独限流
        # ──────────────────────────────────────────────────
        location /api/v1/scripts {
            limit_req zone=global burst=20 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://script_service;
        }

        location ~ ^/api/v1/scripts/[^/]+/analyze$ {
            limit_req zone=ai_api burst=3 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_read_timeout 120s;
            proxy_pass http://script_service;
        }

        # ──────────────────────────────────────────────────
        # /api/v1/skills/*  →  character-service:8004
        # ──────────────────────────────────────────────────
        location /api/v1/skills {
            limit_req zone=global burst=20 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://character_service;
        }

        # ──────────────────────────────────────────────────
        # /api/v1/prompt-templates/*  →  script-service:8003
        # ──────────────────────────────────────────────────
        location /api/v1/prompt-templates {
            limit_req zone=global burst=20 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://script_service;
        }

        # ──────────────────────────────────────────────────
        # /api/v1/characters/*  →  character-service:8004
        # ──────────────────────────────────────────────────
        location /api/v1/characters {
            limit_req zone=global burst=20 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://character_service;
        }

        # ──────────────────────────────────────────────────
        # /api/v1/images/*  →  image-service:8005
        # 生成接口单独限流
        # ──────────────────────────────────────────────────
        location /api/v1/images {
            limit_req zone=global burst=20 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://image_service;
        }

        location ~ ^/api/v1/images/generate$ {
            limit_req zone=ai_api burst=5 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_read_timeout 180s;   # 图像生成超时稍长
            proxy_pass http://image_service;
        }

        # ──────────────────────────────────────────────────
        # /api/v1/voices  →  video-service:8006 (public)
        # ──────────────────────────────────────────────────
        location /api/v1/voices {
            limit_req zone=global burst=20 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://video_service;
        }

        # ──────────────────────────────────────────────────
        # /api/v1/videos/*  →  video-service:8006
        # ──────────────────────────────────────────────────
        location /api/v1/videos {
            limit_req zone=global burst=10 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_read_timeout 300s;   # 视频合成耗时更长
            proxy_pass http://video_service;
        }

        # ──────────────────────────────────────────────────
        # /api/v1/tasks/*  →  task-service:8007
        # ──────────────────────────────────────────────────
        location /api/v1/tasks {
            limit_req zone=global burst=30 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://task_service;
        }

        # ──────────────────────────────────────────────────
        # /api/v1/models/*  →  model-service:8008
        # ──────────────────────────────────────────────────
        location /api/v1/models {
            limit_req zone=global burst=20 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://model_service;
        }

        # ──────────────────────────────────────────────────
        # /api/v1/storage/*  →  storage-service:8009
        # ──────────────────────────────────────────────────
        location /api/v1/storage {
            limit_req zone=global burst=10 nodelay;
            client_max_body_size 500m;           # 大文件上传
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_request_buffering off;         # 流式上传
            proxy_pass http://storage_service;
        }

        # ──────────────────────────────────────────────────
        # /media/*  →  MinIO:9000  (静态资源代理)
        # 前端通过 /media/videos/... 访问存储的视频/图片
        # ──────────────────────────────────────────────────
        location /media/ {
            # 无需认证，MinIO buckets 已设为 public
            rewrite ^/media/(.*)$ /$1 break;
            proxy_pass http://minio;
            proxy_set_header Host $host;
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-amz-id-2;
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Cache-Control "public, max-age=86400";
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        # ──────────────────────────────────────────────────
        # WebSocket: /ws/*  →  task-service:8007
        # 支持实时任务进度推送
        # ──────────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://task_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout  3600s;           # WS 长连接
            proxy_send_timeout  3600s;
        }
    }
}
