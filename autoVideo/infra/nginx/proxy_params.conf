# ── 通用反向代理参数（被 nginx.conf location 块 include）──
proxy_http_version      1.1;
proxy_set_header        Host              $host;
proxy_set_header        X-Real-IP         $remote_addr;
proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header        X-Forwarded-Proto $scheme;
proxy_set_header        X-Request-ID      $request_id;
proxy_set_header        Connection        "";

# 屏蔽上游服务自带的 CORS 头，避免与 nginx 下方 add_header 重复导致多值
proxy_hide_header Access-Control-Allow-Origin;
proxy_hide_header Access-Control-Allow-Methods;
proxy_hide_header Access-Control-Allow-Headers;
proxy_hide_header Access-Control-Allow-Credentials;
proxy_hide_header Access-Control-Expose-Headers;
proxy_hide_header Access-Control-Max-Age;

# CORS 预检 — 在代理前直接返回
if ($request_method = 'OPTIONS') {
    add_header Access-Control-Allow-Origin  $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-User-ID" always;
    add_header Access-Control-Max-Age 86400;
    add_header Content-Length 0;
    return 204;
}

# CORS 响应头（对所有非 OPTIONS 请求也加）
add_header Access-Control-Allow-Origin  $cors_origin always;
add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-User-ID" always;
add_header X-Request-ID $request_id always;

proxy_connect_timeout   5s;
proxy_send_timeout      60s;

# 缓冲（大响应时避免后端阻塞）
proxy_buffering         on;
proxy_buffer_size       8k;
proxy_buffers           8 64k;
