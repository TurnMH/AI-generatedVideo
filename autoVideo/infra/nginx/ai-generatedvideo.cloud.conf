# HTTP → 重定向到 HTTPS
server {
    listen 80;
    server_name 10003.klyhtest.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://10003.klyhtest.com$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name 10003.klyhtest.com;

    ssl_certificate     /etc/ssl/klyhtest.com/test.crt;
    ssl_certificate_key /etc/ssl/klyhtest.com/test.key;

    root /home/autoVideo/web;
    index index.html;
    etag off;
    gzip off;
    sendfile off;

    # API → gateway:8000
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket → gateway:8000
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    location = /tools/video {
        return 302 /video-serial/quick;
    }

    # Next static export keeps route data in index.txt under each directory.
    # Normalize list/create/static tool pages so direct loads and client route-data requests resolve the same files.
    location ~ ^/projects(?:(/new))?/?$ {
        rewrite ^ /projects$1/index.html last;
    }

    location ~ ^/projects(?:(/new))?\.txt$ {
        rewrite ^ /projects$1/index.txt last;
    }

    location ~ ^/video-serial(?:(/(?:new|quick)))?/?$ {
        rewrite ^ /video-serial$1/index.html last;
    }

    location ~ ^/video-serial(?:(/(?:new|quick)))?\.txt$ {
        rewrite ^ /video-serial$1/index.txt last;
    }

    location /_next/static/ {
        access_log off;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location ~ ^/projects/(?!__dynamic__/)[^/]+/(characters|generate|storyboard)/?$ {
        rewrite ^ /projects/__dynamic__/$1/ last;
    }

    location ~ ^/projects/(?!__dynamic__/)[^/]+/(characters|generate|storyboard)(?:/index)?\.(txt|html)$ {
        rewrite ^ /projects/__dynamic__/$1/index.$2 last;
    }

    location ~ ^/projects/(?!(?:__dynamic__|new|index\.txt|index\.html)(?:/|$))[^/]+(?:/index)?\.(txt|html)$ {
        rewrite ^ /projects/__dynamic__/index.$1 last;
    }

    location ~ ^/projects/(?!(?:__dynamic__|new|index\.txt|index\.html)(?:/|$))[^/]+/?$ {
        rewrite ^ /projects/__dynamic__/ last;
    }

    location ~ ^/video-serial/(?!__dynamic__/)[^/]+/generate/?$ {
        rewrite ^ /video-serial/__dynamic__/generate/ last;
    }

    location ~ ^/video-serial/(?!__dynamic__/)[^/]+/generate(?:/index)?\.(txt|html)$ {
        rewrite ^ /video-serial/__dynamic__/generate/index.$1 last;
    }

    location ~ ^/video-serial/(?!(?:__dynamic__|new|quick|index\.txt|index\.html)(?:/|$))[^/]+(?:/index)?\.(txt|html)$ {
        rewrite ^ /video-serial/__dynamic__/index.$1 last;
    }

    location ~ ^/video-serial/(?!(?:__dynamic__|new|quick|index\.txt|index\.html)(?:/|$))[^/]+/?$ {
        rewrite ^ /video-serial/__dynamic__/ last;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ $uri.html /404.html;
    }
}