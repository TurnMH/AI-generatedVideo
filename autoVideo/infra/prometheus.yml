global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: autovideo
    env: local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: auth-service
    static_configs:
      - targets: ["host.docker.internal:8081"]
    metrics_path: /metrics

  - job_name: project-service
    static_configs:
      - targets: ["host.docker.internal:8082"]
    metrics_path: /metrics

  - job_name: script-service
    static_configs:
      - targets: ["host.docker.internal:8083"]
    metrics_path: /metrics

  - job_name: character-service
    static_configs:
      - targets: ["host.docker.internal:8084"]
    metrics_path: /metrics

  - job_name: image-service
    static_configs:
      - targets: ["host.docker.internal:8085"]
    metrics_path: /metrics

  - job_name: video-service
    static_configs:
      - targets: ["host.docker.internal:8086"]
    metrics_path: /metrics

  - job_name: task-service
    static_configs:
      - targets: ["host.docker.internal:8087"]
    metrics_path: /metrics

  - job_name: model-service
    static_configs:
      - targets: ["host.docker.internal:8088"]
    metrics_path: /metrics

  - job_name: storage-service
    static_configs:
      - targets: ["host.docker.internal:8089"]
    metrics_path: /metrics

  - job_name: notify-service
    static_configs:
      - targets: ["host.docker.internal:8090"]
    metrics_path: /metrics
