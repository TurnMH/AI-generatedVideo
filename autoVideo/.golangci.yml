run:
  concurrency: 4
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - goimports
    - gosec
    - unused

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true

  revive:
    rules:
      - name: exported
      - name: unexported-return
      - name: error-return
      - name: error-naming
      - name: if-return
      - name: var-naming
      - name: package-comments

  goimports:
    local-prefixes: github.com/autovideo

  gosec:
    excludes:
      - G104  # allow unhandled errors in defer (handled by errcheck)

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    - path: cmd/
      linters:
        - unused
  max-issues-per-linter: 0
  max-same-issues: 0
